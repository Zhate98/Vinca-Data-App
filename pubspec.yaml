name: vinca_data
description: "Vinca Data — Finanzas personales. Versión móvil (Flutter) de la plataforma web."
publish_to: "none"
version: 1.2.0+17

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # UI / utilidades
  go_router: ^14.2.7
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Splash & icono adaptativo (dev-time generators)
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

# ── Icono adaptativo (ejecuta: dart run flutter_launcher_icons) ──────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0F1729"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  min_sdk_android: 21

# ── Splash screen (ejecuta: dart run flutter_native_splash:create) ───────────
flutter_native_splash:
  color: "#0F1729"
  image: assets/splash.png
  android_12:
    color: "#0F1729"
    image: assets/splash.png
